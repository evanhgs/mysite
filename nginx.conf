worker_processes auto;

# PID dans /tmp (toujours accessible en écriture)
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;
    error_log  /dev/stderr warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # Fichiers pré-compressés au build (voir Dockerfile) : nginx sert
    # directement le .gz sans compresser à la volée.
    gzip_static on;

    # Repli dynamique pour ce qui n'est pas pré-compressé
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;

    # Cache des descripteurs de fichiers servis souvent
    open_file_cache max=1000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;

    server {
        listen       8080;
        server_name  localhost;
        # https://evanhgs.fr

        root /usr/share/nginx/html;
        index index.html;

        # En-têtes par défaut : s'appliquent au HTML servi par `location /`
        # (les locations d'assets ci-dessous redéclarent les leurs).
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;

        # Redirection racine côté serveur : plus rapide qu'un meta refresh
        location = / {
            return 301 /fr/;
        }

        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        # Assets fingerprintés par Astro : cache immuable 1 an
        location /_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Polices, icônes et images : cache long
        location ~* \.(?:ico|woff2?|png|jpe?g|gif|webp|avif|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        error_page 404 /404.html;
    }
}
